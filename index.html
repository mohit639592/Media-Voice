<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>MEDIA X</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" href="data:,">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */

body::before{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background:cyan;
  filter:blur(220px);
  opacity:0.08;
  top:-250px;
  left:-250px;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#00ff99;
  filter:blur(220px);
  opacity:0.05;
  bottom:-250px;
  right:-250px;
  z-index:-1;
}

/* NAVBAR */

.navbar{

  width:100%;

  padding:18px 24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  position:sticky;

  top:0;

  z-index:999;

  background:
  rgba(0,0,0,0.55);

  backdrop-filter:blur(14px);

  border-bottom:
  1px solid rgba(255,255,255,0.05);

}

.logo{

  font-size:34px;

  font-weight:bold;

  color:#00ffff;

  text-shadow:
  0 0 20px cyan;

}

.admin-btn{

  padding:12px 18px;

  border:none;

  border-radius:50px;

  background:#101010;

  color:cyan;

  cursor:pointer;

  font-weight:bold;

  border:
  1px solid rgba(0,255,255,0.2);

  transition:0.3s;

}

.admin-btn:hover{

  transform:translateY(-2px);

  box-shadow:
  0 0 18px rgba(0,255,255,0.2);

}

/* HERO */

.hero{

  padding:
  80px 20px 45px;

  text-align:center;

}

.hero h1{

  font-size:78px;

  color:#00ffff;

  text-shadow:
  0 0 35px cyan;

  margin-bottom:15px;

}

.hero p{

  color:#aaa;

  font-size:19px;

}

/* SEARCH */

.search-box{

  width:100%;

  max-width:780px;

  margin:40px auto 0;

  position:relative;

}

.search-box input{

  width:100%;

  padding:
  20px 22px 20px 55px;

  border:none;

  outline:none;

  border-radius:22px;

  background:
  rgba(15,15,15,0.95);

  color:white;

  font-size:16px;

  border:
  1px solid rgba(255,255,255,0.05);

  transition:0.3s;

}

.search-box input:focus{

  border-color:cyan;

  box-shadow:
  0 0 25px rgba(0,255,255,0.15);

}

.search-icon{

  position:absolute;

  left:20px;

  top:50%;

  transform:translateY(-50%);

  color:#777;

  font-size:18px;

}

/* PLAYLISTS */

.playlist-row{

  display:flex;

  gap:12px;

  overflow-x:auto;

  padding:
  10px 20px 35px;

  scrollbar-width:none;

}

.playlist-row::-webkit-scrollbar{
  display:none;
}

.playlist-btn{

  min-width:max-content;

  padding:12px 20px;

  border-radius:50px;

  background:#111;

  color:#ccc;

  cursor:pointer;

  transition:0.3s;

  border:
  1px solid rgba(255,255,255,0.06);

}

.playlist-btn:hover{

  color:cyan;

  border-color:
  rgba(0,255,255,0.25);

  box-shadow:
  0 0 18px rgba(0,255,255,0.12);

}

.active-playlist{

  background:cyan;

  color:black;

  font-weight:bold;

}

/* GRID */

.media-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:28px;

  padding:25px;

}

/* CARD */

.card{

  background:
  linear-gradient(
    145deg,
    rgba(20,20,20,0.96),
    rgba(10,10,10,0.96)
  );

  border-radius:30px;

  overflow:hidden;

  border:
  1px solid rgba(255,255,255,0.05);

  transition:0.4s ease;

  position:relative;

  backdrop-filter:blur(10px);

  animation:fadeUp 0.5s ease;

}

.card:hover{

  transform:
  translateY(-8px)
  scale(1.02);

  box-shadow:
  0 0 30px rgba(0,255,255,0.18),
  0 0 60px rgba(0,255,255,0.08);

}

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* THUMB */

.thumb{

  width:100%;

  aspect-ratio:16/9;

  object-fit:cover;

  display:block;

  image-rendering:auto;

}

/* CONTENT */

.card-content{
  padding:20px;
}

.title{

  font-size:22px;

  color:white;

  margin-bottom:10px;

  display:-webkit-box;

  -webkit-line-clamp:2;

  -webkit-box-orient:vertical;

  overflow:hidden;

  min-height:55px;

}

.artist{

  color:#aaa;

  font-size:14px;

  margin-bottom:10px;

}

.playlist-name{

  color:#00ffff;

  font-size:13px;

  margin-bottom:20px;

}

/* BUTTONS */

.btn-row{

  display:flex;

  gap:12px;

}

.play-btn{

  flex:1;

  padding:14px;

  border:none;

  border-radius:16px;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;

  font-size:15px;

}

.video-btn{

  background:#00ffff;

  color:black;

}

.audio-btn{

  background:#00ff99;

  color:black;

}

.play-btn:hover{

  transform:scale(1.04);

}

/* LOADING */

.loading{

  text-align:center;

  color:#00ffff;

  font-size:22px;

  padding:70px;

}

/* MOBILE */

@media(max-width:700px){

  .hero h1{
    font-size:52px;
  }

  .hero p{
    font-size:16px;
  }

  .media-grid{

    grid-template-columns:1fr;

    padding:18px;

  }

  .card{
    border-radius:25px;
  }

}

</style>
</head>
<body>

<!-- NAVBAR -->

<div class="navbar">

  <div class="logo">
    MEDIA X
  </div>

  <button class="admin-btn"
  onclick="window.location.href='admin.html'">

    Admin

  </button>

</div>

<!-- HERO -->

<div class="hero">

  <h1>MEDIA X</h1>

  <p>
    Futuristic Personal Streaming Platform
  </p>

  <!-- SEARCH -->

  <div class="search-box">

    <i class="fa-solid fa-magnifying-glass search-icon"></i>

    <input
      type="text"
      id="searchInput"
      placeholder="Search songs, artists, playlists..."
    >

  </div>

</div>

<!-- PLAYLISTS -->

<div class="playlist-row"
id="playlistRow"></div>

<!-- MEDIA GRID -->

<div class="media-grid"
id="mediaGrid">

  <div class="loading">
    Loading Media...
  </div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain:
  "media-x-104d2.firebaseapp.com",

  projectId:
  "media-x-104d2",

  storageBucket:
  "media-x-104d2.firebasestorage.app",

  messagingSenderId:
  "763389190073",

  appId:
  "1:763389190073:web:94d1de3ac9c2652e6fe068"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let allMedia = [];

let currentPlaylist = [];

/* LOAD MEDIA */

async function loadMedia(){

  try{

    const mediaGrid =
    document.getElementById("mediaGrid");

    const snapshot =
    await db.collection("media").get();

    allMedia = [];

    snapshot.forEach((doc)=>{

      const data = doc.data();

      if(!data.youtubeId) return;

      const mediaItem = {

        title:
        data.title || "Unknown Title",

        artist:
        data.artist || "Unknown Artist",

        playlist:
        data.playlist || "General",

        category:
        data.category || "media",

        youtubeId:
        data.youtubeId,

        thumbnail:
        data.thumbnail ||
        `https://img.youtube.com/vi/${data.youtubeId}/maxresdefault.jpg`,

        titleLower:
        (data.title || "").toLowerCase(),

        artistLower:
        (data.artist || "").toLowerCase(),

        playlistLower:
        (data.playlist || "").toLowerCase(),

        categoryLower:
        (data.category || "").toLowerCase()

      };

      allMedia.push(mediaItem);

    });

    currentPlaylist = [...allMedia];

    renderMedia(allMedia);

    renderPlaylists();

    if(allMedia.length === 0){

      mediaGrid.innerHTML = `
      <div class="loading">
      No media found
      </div>
      `;

    }

  }

  catch(error){

    console.error(error);

    document.getElementById("mediaGrid")
    .innerHTML = `
    <div class="loading">
    Failed to load media
    </div>
    `;

  }

}

/* PLAYLISTS */

function renderPlaylists(){

  const playlistRow =
  document.getElementById("playlistRow");

  playlistRow.innerHTML = "";

  const playlists =
  [...new Set(
    allMedia.map(item => item.playlist)
  )];

  playlistRow.innerHTML += `

    <div
    class="playlist-btn active-playlist"
    onclick="showAll(this)">

    All

    </div>

  `;

  playlists.forEach((playlist)=>{

    playlistRow.innerHTML += `

      <div
      class="playlist-btn"
      onclick="filterPlaylist('${playlist}',this)">

      ${playlist}

      </div>

    `;

  });

}

/* MEDIA RENDER */

function renderMedia(data){

  const mediaGrid =
  document.getElementById("mediaGrid");

  mediaGrid.innerHTML = "";

  if(data.length === 0){

    mediaGrid.innerHTML = `
    <div class="loading">
    No matching media found
    </div>
    `;

    return;

  }

  data.forEach((item)=>{

    mediaGrid.innerHTML += `

    <div class="card">

      <img
      class="thumb"

      src="${item.thumbnail}"

      loading="lazy"

      onerror="
      this.onerror=null;
      this.src='https://img.youtube.com/vi/${item.youtubeId}/hqdefault.jpg';
      "
      >

      <div class="card-content">

        <div class="title">
        ${item.title}
        </div>

        <div class="artist">
        ${item.artist}
        </div>

        <div class="playlist-name">
        ${item.playlist}
        </div>

        <div class="btn-row">

          <button
          class="play-btn video-btn"
          onclick="openVideo('${item.youtubeId}')">

          Play Video

          </button>

          <button
          class="play-btn audio-btn"
          onclick="openMusic('${item.youtubeId}')">

          Play Audio

          </button>

        </div>

      </div>

    </div>

    `;

  });

}

/* FILTER */

window.filterPlaylist =
function(name,element){

  document
  .querySelectorAll(".playlist-btn")

  .forEach(btn=>{

    btn.classList.remove(
      "active-playlist"
    );

  });

  element.classList.add(
    "active-playlist"
  );

  const filtered =
  allMedia.filter(item =>

    item.playlistLower ===
    name.toLowerCase()

  );

  currentPlaylist = [...filtered];

  renderMedia(filtered);

}

/* SHOW ALL */

window.showAll = function(element){

  document
  .querySelectorAll(".playlist-btn")

  .forEach(btn=>{

    btn.classList.remove(
      "active-playlist"
    );

  });

  element.classList.add(
    "active-playlist"
  );

  currentPlaylist = [...allMedia];

  renderMedia(allMedia);

}

/* SEARCH */

document
.getElementById("searchInput")

.addEventListener("input",(e)=>{

  const value =
  e.target.value.toLowerCase();

  const filtered =
  allMedia.filter(item =>

    item.titleLower.includes(value) ||

    item.artistLower.includes(value) ||

    item.playlistLower.includes(value) ||

    item.categoryLower.includes(value)

  );

  currentPlaylist = [...filtered];

  renderMedia(filtered);

});

/* OPEN VIDEO */

window.openVideo = function(id){

  window.location.href =
  `video.html?id=${id}`;

}

/* OPEN MUSIC */

window.openMusic = function(id){

  window.location.href =
  `music.html?id=${id}`;

}

/* START */

loadMedia();

</script>

<script>

if("serviceWorker" in navigator){

  navigator.serviceWorker
  .register("service-worker.js")

  .then(()=>{

    console.log(
      "Service Worker Registered"
    );

  });

}

</script>

</body>
</html>
