<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>MEDIA X</title>
<link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:,">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#050505;
      color:white;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      width:500px;
      height:500px;
      background:cyan;
      filter:blur(180px);
      opacity:0.08;
      top:-200px;
      left:-200px;
      z-index:-1;
    }

    body::after{
      content:"";
      position:fixed;
      width:400px;
      height:400px;
      background:#00ff99;
      filter:blur(180px);
      opacity:0.06;
      bottom:-200px;
      right:-200px;
      z-index:-1;
    }

    .navbar{
      width:100%;
      padding:18px 22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:100;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    .logo{
      font-size:30px;
      font-weight:bold;
      color:#00ffff;
      text-shadow:0 0 18px cyan;
    }

    .admin-btn{
      padding:10px 18px;
      border:none;
      border-radius:50px;
      background:#111;
      color:cyan;
      border:1px solid rgba(0,255,255,0.2);
      cursor:pointer;
      transition:0.3s;
    }

    .admin-btn:hover{
      box-shadow:0 0 20px rgba(0,255,255,0.2);
    }

    .hero{
      padding:70px 20px 40px;
      text-align:center;
    }

    .hero h1{
      font-size:65px;
      color:#00ffff;
      text-shadow:0 0 30px cyan;
      margin-bottom:15px;
    }

    .hero p{
      color:#999;
      font-size:18px;
    }

    .search-box{
      width:100%;
      max-width:720px;
      margin:35px auto 0;
    }

    .search-box input{
      width:100%;
      padding:18px 20px;
      border:none;
      outline:none;
      border-radius:18px;
      background:#101010;
      color:white;
      font-size:16px;
      border:1px solid rgba(255,255,255,0.05);
    }

    .search-box input:focus{
      border-color:cyan;
      box-shadow:0 0 20px rgba(0,255,255,0.15);
    }

    .playlist-row{
      display:flex;
      gap:12px;
      overflow-x:auto;
      padding:10px 20px 30px;
      scrollbar-width:none;
    }

    .playlist-row::-webkit-scrollbar{
      display:none;
    }

    .playlist-btn{
      min-width:max-content;
      padding:12px 18px;
      border-radius:50px;
      background:#111;
      color:#ccc;
      border:1px solid rgba(255,255,255,0.05);
      cursor:pointer;
      transition:0.3s;
    }

    .playlist-btn:hover{
      color:cyan;
      border-color:rgba(0,255,255,0.2);
      box-shadow:0 0 15px rgba(0,255,255,0.15);
    }

    .active-playlist{
      background:cyan;
      color:black;
      font-weight:bold;
    }

    .media-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:22px;
      padding:20px;
    }

    .card{
      background:#0f0f0f;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.05);
      transition:0.35s;
      position:relative;
    }

    .card:hover{
      transform:translateY(-5px);

      box-shadow:
      0 0 25px rgba(0,255,255,0.15),
      0 0 45px rgba(0,255,255,0.08);
    }

    .thumb{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      display:block;
    }

    .card-content{
      padding:18px;
    }

    .title{
      font-size:20px;
      margin-bottom:8px;
      color:white;
    }

    .artist{
      color:#888;
      font-size:14px;
      margin-bottom:8px;
    }

    .playlist-name{
      color:#00ffff;
      font-size:13px;
      margin-bottom:18px;
    }

    .btn-row{
      display:flex;
      gap:10px;
    }

    .play-btn{
      flex:1;
      padding:13px;
      border:none;
      border-radius:14px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .video-btn{
      background:#00ffff;
      color:black;
    }

    .audio-btn{
      background:#00ff99;
      color:black;
    }

    .play-btn:hover{
      transform:scale(1.03);
    }

    .player-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
      padding:20px;
    }

    .player-box{
      width:100%;
      max-width:950px;
      background:#111;
      border-radius:20px;
      overflow:hidden;
      position:relative;

      box-shadow:
      0 0 40px rgba(0,255,255,0.2);
    }

    .close-btn{
      position:absolute;
      top:10px;
      right:15px;
      font-size:30px;
      color:white;
      cursor:pointer;
      z-index:10;
    }

    .player-frame{
      width:100%;
      height:520px;
    }

    .mini-player{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      width:95%;
      max-width:800px;

      background:rgba(15,15,15,0.95);

      border:1px solid rgba(0,255,255,0.1);

      border-radius:22px;

      padding:16px;

      display:none;

      align-items:center;
      justify-content:space-between;

      gap:12px;

      backdrop-filter:blur(12px);

      box-shadow:
      0 0 30px rgba(0,255,255,0.15);

      z-index:999;
    }

    .mini-left{
      display:flex;
      align-items:center;
      gap:14px;
      flex:1;
    }

    .mini-thumb{
      width:65px;
      height:65px;
      border-radius:14px;
      object-fit:cover;
    }

    .mini-info h3{
      font-size:16px;
      margin-bottom:4px;
    }

    .mini-info p{
      color:#888;
      font-size:13px;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .control-btn{
      padding:12px 16px;
      border:none;
      border-radius:12px;
      background:#00ffff;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .control-btn:hover{
      transform:scale(1.05);
    }

    #youtube-player{
      width:1px;
      height:1px;
      opacity:0;
      position:absolute;
    }

    .loading{
      text-align:center;
      color:#00ffff;
      font-size:20px;
      padding:50px;
    }

    @media(max-width:700px){

      .hero h1{
        font-size:48px;
      }

      .player-frame{
        height:260px;
      }

      .mini-player{
        flex-direction:column;
        align-items:flex-start;
      }

      .controls{
        width:100%;
        justify-content:space-between;
      }

      .control-btn{
        flex:1;
      }

    }

  </style>
</head>
<body>

<div class="navbar">

  <div class="logo">
    MEDIA X
  </div>

  <button class="admin-btn"
    onclick="window.location.href='admin.html'">

    Admin

  </button>

</div>

<div class="hero">

  <h1>MEDIA X</h1>

  <p>
    Futuristic Personal Streaming Platform
  </p>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="Search songs, artists, playlists..."
    >

  </div>

</div>

<div class="playlist-row" id="playlistRow"></div>

<div class="media-grid" id="mediaGrid">

  <div class="loading">
    Loading Media...
  </div>

</div>

<div class="player-modal" id="videoModal">

  <div class="player-box">

    <div class="close-btn"
      onclick="closeVideo()">
      ×
    </div>

    <iframe
      id="videoFrame"
      class="player-frame"
      src=""
      frameborder="0"
      allowfullscreen
      allow="autoplay">
    </iframe>

  </div>

</div>

<div class="mini-player" id="miniPlayer">

  <div class="mini-left">

    <img
      src=""
      id="miniThumb"
      class="mini-thumb"
    >

    <div class="mini-info">

      <h3 id="miniTitle">Playing...</h3>

      <p id="miniArtist">Artist</p>

    </div>

  </div>

  <div class="controls">

    <button class="control-btn"
      onclick="prevSong()">
      ⏮
    </button>

    <button class="control-btn"
      onclick="toggleRepeat()"
      id="repeatBtn">
      Repeat Off
    </button>

    <button class="control-btn"
      onclick="nextSong()">
      ⏭
    </button>

    <button class="control-btn"
      onclick="stopAudio()">
      ✕
    </button>

  </div>

</div>

<div id="youtube-player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>


const firebaseConfig = {

  apiKey: "AIzaSyBFLZBEDU1SoYCdzOAqy58emc2v3HW_gRM",
  authDomain: "media-x-104d2.firebaseapp.com",
  projectId: "media-x-104d2",
  storageBucket: "media-x-104d2.firebasestorage.app",
  messagingSenderId: "763389190073",
  appId: "1:763389190073:web:94d1de3ac9c2652e6fe068",
  measurementId: "G-NR9RJJTE82"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let allMedia = [];

let currentPlaylist = [];

let currentIndex = 0;

let repeatMode = false;

let player;

let playerReady = false;

/* LOAD MEDIA */

async function loadMedia(){

  try{

    const mediaGrid =
    document.getElementById("mediaGrid");

    const snapshot =
    await db.collection("media").get();

    allMedia = [];

    snapshot.forEach((doc)=>{

      const data = doc.data();

      if(!data.youtubeId) return;

      const mediaItem = {

        title:
        data.title || "Unknown Title",

        artist:
        data.artist || "Unknown Artist",

        playlist:
        data.playlist || "General",

        category:
        data.category || "media",

        youtubeId:
        data.youtubeId,

        thumbnail:
        data.thumbnail ||
        `https://img.youtube.com/vi/${data.youtubeId}/hqdefault.jpg`,

        titleLower:
        (data.title || "").toLowerCase(),

        artistLower:
        (data.artist || "").toLowerCase(),

        playlistLower:
        (data.playlist || "").toLowerCase(),

        categoryLower:
        (data.category || "").toLowerCase()

      };

      allMedia.push(mediaItem);

    });

    currentPlaylist = [...allMedia];

    renderMedia(allMedia);

    renderPlaylists();

    if(allMedia.length === 0){

      mediaGrid.innerHTML = `
        <div class="loading">
          No media found
        </div>
      `;

    }

  }

  catch(error){

    console.error(error);

    document.getElementById("mediaGrid")
    .innerHTML = `
      <div class="loading">
        Failed to load media
      </div>
    `;

  }

}

/* PLAYLISTS */

function renderPlaylists(){

  const playlistRow =
  document.getElementById("playlistRow");

  playlistRow.innerHTML = "";

  const playlists =
  [...new Set(
    allMedia.map(item => item.playlist)
  )];

  playlistRow.innerHTML += `
    <div
      class="playlist-btn active-playlist"
      onclick="showAll(this)">
      All
    </div>
  `;

  playlists.forEach((playlist)=>{

    playlistRow.innerHTML += `
      <div
        class="playlist-btn"
        onclick="filterPlaylist('${playlist}',this)">
        ${playlist}
      </div>
    `;

  });

}

/* MEDIA RENDER */

function renderMedia(data){

  const mediaGrid =
  document.getElementById("mediaGrid");

  mediaGrid.innerHTML = "";

  if(data.length === 0){

    mediaGrid.innerHTML = `
      <div class="loading">
        No matching media found
      </div>
    `;

    return;

  }

  data.forEach((item,index)=>{

    mediaGrid.innerHTML += `

      <div class="card">

        <img
          class="thumb"
          src="${item.thumbnail}"
          onerror="this.src='https://via.placeholder.com/500x300?text=MEDIA+X'"
        >

        <div class="card-content">

          <div class="title">
            ${item.title}
          </div>

          <div class="artist">
            ${item.artist}
          </div>

          <div class="playlist-name">
            ${item.playlist}
          </div>

          <div class="btn-row">

            <button
            class="play-btn video-btn"
            onclick="openVideo('${item.youtubeId}')">

            Play Video

            </button>

            <button
  class="play-btn audio-btn"
  onclick="openMusic('${item.youtubeId}')">

  Play Audio

</button>

          </div>

        </div>

      </div>

    `;

  });

}

/* PLAYLIST FILTER */

window.filterPlaylist = function(name,element){

  document.querySelectorAll(".playlist-btn")
  .forEach(btn=>{

    btn.classList.remove("active-playlist");

  });

  element.classList.add("active-playlist");

  const filtered =
  allMedia.filter(item =>

    item.playlistLower ===
    name.toLowerCase()

  );

  currentPlaylist = [...filtered];

  renderMedia(filtered);

}

/* SHOW ALL */

window.showAll = function(element){

  document.querySelectorAll(".playlist-btn")
  .forEach(btn=>{

    btn.classList.remove("active-playlist");

  });

  element.classList.add("active-playlist");

  currentPlaylist = [...allMedia];

  renderMedia(allMedia);

}

/* VIDEO */

window.openVideo = function(id){

  window.location.href =
  `video.html?id=${id}`;

}

window.closeVideo = function(){

  document.getElementById("videoModal")
  .style.display = "none";

  document.getElementById("videoFrame").src = "";

}

/* YOUTUBE API */

window.onYouTubeIframeAPIReady = function(){

  player = new YT.Player("youtube-player",{

    height:"1",
    width:"1",

    playerVars:{
      autoplay:1
    },

    events:{

      onReady:()=>{

        playerReady = true;

        console.log("Player Ready");

      },

      onStateChange:onPlayerStateChange

    }

  });

}

/* AUDIO */


window.openMusic = function(id){

  window.location.href =
  `music.html?id=${id}`;

}

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener("input",(e)=>{

  const value =
  e.target.value.toLowerCase();

  const filtered =
  allMedia.filter(item =>

    item.titleLower.includes(value) ||

    item.artistLower.includes(value) ||

    item.playlistLower.includes(value) ||

    item.categoryLower.includes(value)

  );

  currentPlaylist = [...filtered];

  renderMedia(filtered);

});

/* START */

loadMedia();

</script>

<script>

if("serviceWorker" in navigator){

  navigator.serviceWorker
  .register("service-worker.js")

  .then(()=>{

    console.log("Service Worker Registered");

  });

}

</script>

</body>
</html>
