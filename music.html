<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MEDIA X MUSIC</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:black;
  color:white;
  overflow:hidden;
  height:100vh;
}

.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(45px);
  transform:scale(1.2);
  opacity:0.22;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.player{
  width:100%;
  max-width:420px;

  background:rgba(15,15,15,0.82);

  border:1px solid rgba(255,255,255,0.05);

  border-radius:35px;

  padding:28px;

  backdrop-filter:blur(20px);

  box-shadow:
  0 0 40px rgba(0,255,255,0.12);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.top-btn{
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#111;
  color:cyan;
  font-size:18px;
  cursor:pointer;
}

.album{

  width:280px;
  height:280px;

  display:block;

  margin:auto;

  object-fit:cover;

  border-radius:50%;

  margin-bottom:30px;

  box-shadow:
  0 0 45px rgba(0,255,255,0.22);

  animation:rotateAlbum 35s linear infinite;

  animation-play-state:paused;

}

.playing .album{
  animation-play-state:running;
}

@keyframes rotateAlbum{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

.title{
  font-size:34px;
  font-weight:bold;
  margin-bottom:8px;
}

.artist{
  color:#aaa;
  margin-bottom:30px;
  font-size:16px;
}

/* PROGRESS */

.progress-area{
  margin-bottom:30px;
}

#seekBar{

  width:100%;

  appearance:none;

  height:6px;

  border-radius:20px;

  background:#222;

  outline:none;

  cursor:pointer;

}

#seekBar::-webkit-slider-thumb{

  appearance:none;

  width:18px;
  height:18px;

  border-radius:50%;

  background:cyan;

  cursor:pointer;

  box-shadow:
  0 0 15px cyan;

}

.time-row{

  margin-top:10px;

  display:flex;

  justify-content:space-between;

  color:#aaa;

  font-size:13px;

}

/* CONTROLS */

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:22px;
  margin-bottom:30px;
}

.icon-btn{
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:#111;
  color:white;
  font-size:22px;
  cursor:pointer;
}

.play-btn{

  width:85px;
  height:85px;

  background:cyan;
  color:black;

  font-size:28px;

  box-shadow:
  0 0 35px rgba(0,255,255,0.35);

}

.bottom-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small-btn{
  background:none;
  border:none;
  color:#aaa;
  font-size:22px;
  cursor:pointer;
}

.small-btn.active{
  color:cyan;
}

#youtube-player{
  position:fixed;
  bottom:-999px;
  right:-999px;
}

@media(max-width:500px){

  .player{
    max-width:100%;
    border-radius:28px;
  }

  .title{
    font-size:28px;
  }

}

</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="overlay"></div>

<div class="container">

<div class="player" id="playerCard">

<div class="topbar">

<button class="top-btn"
onclick="goHome()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h3>MEDIA X</h3>

<button class="top-btn">

<i class="fa-solid fa-heart"></i>

</button>

</div>

<img
id="album"
class="album"
src="">

<div class="title" id="title">

Loading...

</div>

<div class="artist" id="artist">

Artist

</div>

<!-- PROGRESS -->

<div class="progress-area">

  <input
    type="range"
    id="seekBar"
    value="0"
    min="0"
    max="100"
  >

  <div class="time-row">

    <span id="currentTime">
      0:00
    </span>

    <span id="duration">
      0:00
    </span>

  </div>

</div>

<!-- CONTROLS -->

<div class="controls">

<button class="icon-btn"
onclick="restartSong()">

<i class="fa-solid fa-backward-step"></i>

</button>

<button
class="icon-btn play-btn"
onclick="togglePlay()"
id="playBtn">

<i class="fa-solid fa-pause"></i>

</button>

<button class="icon-btn"
onclick="forwardSong()">

<i class="fa-solid fa-forward-step"></i>

</button>

</div>

<div class="bottom-row">

<button class="small-btn"
onclick="toggleRepeat()"
id="repeatBtn">

<i class="fa-solid fa-repeat"></i>

</button>

<button class="small-btn"
onclick="shareSong()">

<i class="fa-solid fa-share"></i>

</button>

<button class="small-btn"
onclick="goHome()">

<i class="fa-solid fa-house"></i>

</button>

</div>

</div>

</div>

<div id="youtube-player"></div>

<script>

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "media-x-104d2.firebaseapp.com",

  projectId: "media-x-104d2",

  storageBucket: "media-x-104d2.firebasestorage.app",

  messagingSenderId: "763389190073",

  appId: "1:763389190073:web:94d1de3ac9c2652e6fe068"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
new URLSearchParams(window.location.search);

const id = params.get("id");

let player;

let isPlaying = true;

let repeatMode = false;

let currentData = null;

let playlist = [];

let currentIndex = 0;

/* LOAD PLAYLIST */

async function loadSong(){

  const snapshot =
  await db.collection("media").get();

  playlist = [];

  snapshot.forEach((doc)=>{

    playlist.push(doc.data());

  });

  currentIndex =
  playlist.findIndex(
    song => song.youtubeId === id
  );

  if(currentIndex < 0){

    currentIndex = 0;

  }

  loadCurrentSong();

}

/* LOAD CURRENT SONG */

function loadCurrentSong(){

  currentData = playlist[currentIndex];

  document.getElementById("title")
  .innerText = currentData.title;

  document.getElementById("artist")
  .innerText = currentData.artist;

  document.getElementById("album")
  .src = currentData.thumbnail;

  document.getElementById("bg")
  .style.backgroundImage =
  `url('${currentData.thumbnail}')`;

  setupMediaSession();

  if(player){

    player.loadVideoById(
      currentData.youtubeId
    );

  }

}

/* YOUTUBE PLAYER */

window.onYouTubeIframeAPIReady = function(){

  player = new YT.Player('youtube-player', {

    height:'1',
    width:'1',

    videoId:id,

    playerVars:{
      autoplay:1
    },

    events:{
      onReady:onPlayerReady,
      onStateChange:onPlayerStateChange
    }

  });

}

function onPlayerReady(){

  document.getElementById("playerCard")
  .classList.add("playing");

  setInterval(updateProgress,1000);

}

/* UPDATE PROGRESS */

function updateProgress(){

  if(player && player.getCurrentTime){

    const current =
    player.getCurrentTime();

    const duration =
    player.getDuration();

    if(duration > 0){

      const percent =
      (current / duration) * 100;

      document.getElementById("seekBar")
      .value = percent;

      document.getElementById("currentTime")
      .innerText = formatTime(current);

      document.getElementById("duration")
      .innerText = formatTime(duration);

    }

  }

}

/* SEEK */

document
.getElementById("seekBar")
.addEventListener("input",(e)=>{

  if(player && player.getDuration){

    const duration =
    player.getDuration();

    const seekTo =
    (e.target.value / 100) * duration;

    player.seekTo(seekTo,true);

  }

});

/* FORMAT TIME */

function formatTime(time){

  const mins = Math.floor(time / 60);

  const secs = Math.floor(time % 60);

  return `${mins}:${secs < 10 ? '0'+secs : secs}`;

}

/* PLAY PAUSE */

function togglePlay(){

  if(isPlaying){

    player.pauseVideo();

    document.getElementById("playBtn")
    .innerHTML =
    '<i class="fa-solid fa-play"></i>';

    document.getElementById("playerCard")
    .classList.remove("playing");

    isPlaying = false;

  }

  else{

    player.playVideo();

    document.getElementById("playBtn")
    .innerHTML =
    '<i class="fa-solid fa-pause"></i>';

    document.getElementById("playerCard")
    .classList.add("playing");

    isPlaying = true;

  }

}

/* PREVIOUS SONG */

function restartSong(){

  currentIndex--;

  if(currentIndex < 0){

    currentIndex =
    playlist.length - 1;

  }

  loadCurrentSong();

}

/* NEXT SONG */

function forwardSong(){

  currentIndex++;

  if(currentIndex >= playlist.length){

    currentIndex = 0;

  }

  loadCurrentSong();

}

/* REPEAT */

function toggleRepeat(){

  repeatMode = !repeatMode;

  document.getElementById("repeatBtn")
  .classList.toggle("active");

}

/* SONG END */

function onPlayerStateChange(event){

  if(event.data == YT.PlayerState.ENDED){

    if(repeatMode){

      player.seekTo(0);

      player.playVideo();

    }

    else{

      forwardSong();

    }

  }

}

/* SHARE */

function shareSong(){

  navigator.share({

    title:currentData.title,

    text:'Listen on MEDIA X',

    url:
    `${window.location.origin}/music.html?id=${currentData.youtubeId}`

  });

}

/* HOME */

function goHome(){

  window.location.href='index.html';

}

/* MEDIA SESSION */

function setupMediaSession(){

  if('mediaSession' in navigator){

    navigator.mediaSession.metadata =

    new MediaMetadata({

      title:currentData.title,

      artist:currentData.artist,

      artwork:[

        {

          src:currentData.thumbnail,

          sizes:'512x512',

          type:'image/png'

        }

      ]

    });

  }

}

/* START */

loadSong();

</script>

<script>

if("serviceWorker" in navigator){

  navigator.serviceWorker
  .register("service-worker.js")

  .then(()=>{

    console.log("Service Worker Registered");

  });

}

</script>

</body>
</html>
